name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write update token for installed apps
        run: node -e "require('fs').writeFileSync('electron/github-token.js', 'module.exports = ' + JSON.stringify(process.env.GH_TOKEN) + ';')"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build and publish unsigned release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
